packages:
  - "packages/*"

# pnpm gates dependency install scripts. Allow the two that must run:
# - rescript: its postinstall links the compiler binary.
# - esbuild:  pulled in by Vite; its postinstall installs the native binary
#             the bundler needs.
allowBuilds:
  esbuild: true
  rescript: false

onlyBuiltDependencies:
  - rescript
  - esbuild
