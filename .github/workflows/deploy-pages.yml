name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Publishing to the `gh-pages` branch only needs to push commits, so plain
# `contents: write` replaces the artifact flow's pages/id-token permissions.
permissions:
  contents: write

# Serialize every writer of the `gh-pages` branch (this deploy plus the PR
# preview deploy/cleanup) so concurrent pushes can't race and clobber each
# other. Never cancel an in-flight publish.
concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Bundle the web app
        run: mise run bundle

      - name: Publish to gh-pages root
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: packages/web-app/dist
          # Publish the main site at the branch root, but keep the existing
          # `pr-preview/` umbrella dir (and anything else already there) so a
          # `main` deploy never wipes live PR previews.
          keep_files: true

      # --- Screenshot report ---------------------------------------------------
      # After the app is live, render the device-resolution report and publish it
      # to Pages under a stamped, retained history at
      # `screenshots/branch/main/<date>_<sha>/`, browsable via a generated listing.
      # Every screenshot step is `continue-on-error` so a flaky headless render can
      # never fail the (already-completed) site deploy.
      - name: Install headless Chromium
        continue-on-error: true
        run: mise run playwright-install

      - name: Render screenshot report
        continue-on-error: true
        run: mise run screenshots

      # Fresh checkout of gh-pages (includes the app publish above) to stage the
      # report into and push.
      - name: Check out gh-pages
        continue-on-error: true
        uses: actions/checkout@v7
        with:
          ref: gh-pages
          path: gh-pages

      - name: Publish screenshot report to Pages
        continue-on-error: true
        run: |
          set -euo pipefail
          stamp="$(date -u +%Y.%m.%d)_${GITHUB_SHA::7}"
          node packages/web-app/scripts/stage-screenshots.mjs \
            gh-pages "screenshots/branch/main/$stamp" --index screenshots/branch/main
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && { echo "no report to publish"; exit 0; }
          git commit -m "screenshots: main $stamp"
          for i in 1 2 3 4; do
            git push origin gh-pages && break
            git pull --rebase origin gh-pages || true
            sleep "$((2 ** i))"
          done
